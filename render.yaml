services:
  - type: web
    name: export-control-assistant
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 4
    envVars:
      # Render ダッシュボードの Environment で値を設定すること（ここには値を書かない）
      - key: ANTHROPIC_API_KEY
        sync: false
      # 社内ポータルと同じ資格情報を設定（shinx / Shinx2026Plate!）
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_PASS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.4"

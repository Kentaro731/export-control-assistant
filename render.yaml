services:
  - type: web
    name: export-control-assistant
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      # Render ダッシュボードの Environment で値を設定すること（ここには値を書かない）
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.4"
